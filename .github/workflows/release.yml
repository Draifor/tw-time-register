name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # Required to upload release assets with electron-builder

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure pnpm for hoisted node_modules
        shell: pwsh
        run: |
          @"
          node-linker=hoisted

          onlyBuiltDependencies:
            - better-sqlite3
            - electron
            - esbuild
          "@ | Set-Content .npmrc

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Rebuild native modules for Electron
        run: pnpm exec electron-builder install-app-deps

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm build && pnpm exec electron-builder --win --publish always
