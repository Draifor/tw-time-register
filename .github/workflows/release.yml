name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # Required to upload release assets with electron-builder

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store path
        id: pnpm-cache
        shell: pwsh
        run: echo "STORE_PATH=$(pnpm store path)" >> $env:GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Configure pnpm for hoisted node_modules
        shell: pwsh
        run: |
          @"
          node-linker=hoisted

          onlyBuiltDependencies:
            - better-sqlite3
            - electron
            - esbuild
          "@ | Set-Content .npmrc

      - name: Install dependencies
        env:
          ELECTRON_GET_MAX_RETRIES: '5'
        run: pnpm install --no-frozen-lockfile

      - name: Rebuild native modules for Electron
        run: pnpm exec electron-builder install-app-deps

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm build && pnpm exec electron-builder --win --publish always
